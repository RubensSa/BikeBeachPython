# Nginx site config example for BikeBeach
# Replace `server_name` and paths to match your server.
server {
    listen 80;
    server_name example.com; # replace with your domain or IP

    location = /favicon.ico { access_log off; log_not_found off; }
    location /static/ {
        root /srv/bikebeach; # serve static files from /srv/bikebeach/static/
    }

    location / {
        include proxy_params;
        proxy_pass http://127.0.0.1:8000;
    }
}
