{% extends 'base.html' %}
{% block content %}
<h2>Excluir Bicicleta</h2>
<p>Tem certeza que deseja excluir {{ bike.nome }}?</p>
<form method="post">{% csrf_token %}
  <button class="btn danger" type="submit">Confirmar exclusão</button>
  <a href="{% url 'rentals:bike_detail' bike.pk %}">Cancelar</a>
</form>
{% endblock %}
