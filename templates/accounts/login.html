{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2>Entrar</h2>
    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Usuário</label>
        <input id="username" name="username" required class="auth-input">
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" required class="auth-input">
      </div>
      <button class="auth-btn" type="submit">Entrar</button>
      <p class="auth-link">Não tem conta? <a href="{% url 'accounts:register' %}">Cadastre-se</a></p>
    </form>
  </div>
</div>
{% endblock %}
