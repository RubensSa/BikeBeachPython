{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2>Entrar</h2>
    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Usuário</label>
        <input id="username" name="username" required class="form-control">
      </div>
      <div class="form-group mt-3">
        <label for="password">Senha</label>
        <div class="input-group">
          <input id="password" name="password" type="password" required class="form-control">
          <button class="btn btn-outline-secondary" type="button" data-password-toggle="#password"><i class="bi bi-eye"></i></button>
        </div>
      </div>
      <div class="mt-3 d-grid">
        <button class="btn btn-primary w-100" type="submit">Entrar</button>
      </div>
      <div class="mt-2">
        <a class="text-decoration-none" href="{% url 'accounts:register' %}">Cadastrar</a>
      </div>
      
    </form>
  </div>
</div>
{% endblock %}
