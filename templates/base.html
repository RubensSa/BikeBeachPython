<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bike Beach</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-ENjdO4Dr2bkBIFxQpeoYz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container d-flex align-items-center justify-content-between">
        <div class="brand d-flex align-items-center">
          <a class="brand-link" href="/">
            <h1 class="mb-0">Bike Beach</h1>
          </a>
        </div>
        <nav class="main-nav">
          <a href="/">Home</a>
          <a href="/bikes/">Bicicletas</a>
          {% if user.is_authenticated %}
            <a href="/alugueis/">Meus Aluguéis</a>
            <a href="/accounts/profile/">Perfil</a>
            <a class="btn logout-btn" href="/accounts/logout/">Sair</a>
          {% else %}
            <a href="/accounts/login/">Entrar</a>
            <a href="/accounts/register/">Cadastrar</a>
          {% endif %}
        </nav>
      </div>
    </header>
    <main class="container">
      {% if messages %}
        <ul class="messages">
          {% for message in messages %}
            <li class="message {{ message.tags }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <div class="container text-center">© Bike Beach</div>
    </footer>

    <!-- Bootstrap bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6/2Q5J6kGmQe9Y1R8bW5n3f1Zl+3GzF5h5b6d2eK7ar5sXb+6d0" crossorigin="anonymous"></script>
  </body>
</html>
