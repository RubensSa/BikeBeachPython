<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bike Beach</title>
    <link rel="stylesheet" href="/static/css/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1><a href="/">Bike Beach</a></h1>
        <nav>
          <a href="/">Home</a>
          <a href="/bikes/">Bicicletas</a>
          {% if user.is_authenticated %}
            <a href="/alugueis/">Meus Aluguéis</a>
            <a href="/accounts/profile/">Perfil</a>
            <a href="/accounts/logout/">Sair</a>
          {% else %}
            <a href="/accounts/login/">Entrar</a>
            <a href="/accounts/register/">Cadastrar</a>
          {% endif %}
        </nav>
      </div>
    </header>
    <main class="container">
      {% if messages %}
        <ul class="messages">
          {% for message in messages %}
            <li class="message {{ message.tags }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <div class="container">© Bike Beach</div>
    </footer>
  </body>
</html>
